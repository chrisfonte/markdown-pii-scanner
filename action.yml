name: 'Markdown PII Scanner'
description: 'Scan markdown files for PII (emails, phone numbers, file paths, credentials). Prevent leaks from humans, Copilot, Claude, and AI agents.'
author: 'Chris Fonte'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  path:
    description: 'Directory to scan (default: .)'
    required: false
    default: '.'
  config:
    description: 'Path to custom config file (optional)'
    required: false
    default: ''
  baseline:
    description: 'Path to baseline file (optional). If provided, only new PII will fail the check.'
    required: false
    default: ''
  exclude:
    description: 'Comma-separated list of directories to exclude (e.g., archive,vendor)'
    required: false
    default: ''
  fail-on-match:
    description: 'Exit with error code if PII is found (default: true)'
    required: false
    default: 'true'
  summary:
    description: 'Show summary by directory instead of individual matches (default: false)'
    required: false
    default: 'false'

outputs:
  matches-found:
    description: 'Total number of PII matches found'
    value: ${{ steps.scan.outputs.matches-found }}
  new-matches:
    description: 'Number of new matches (if baseline provided)'
    value: ${{ steps.scan.outputs.new-matches }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Run PII Scanner
      id: scan
      shell: bash
      run: |
        # Build command arguments
        CMD="node ${{ github.action_path }}/bin/markdown-pii-scanner.js"
        ARGS=""

        # Add optional flags
        if [ -n "${{ inputs.config }}" ]; then
          ARGS="$ARGS --config ${{ inputs.config }}"
        fi

        if [ -n "${{ inputs.baseline }}" ]; then
          ARGS="$ARGS --baseline ${{ inputs.baseline }}"
        fi

        if [ -n "${{ inputs.exclude }}" ]; then
          ARGS="$ARGS --exclude ${{ inputs.exclude }}"
        fi

        if [ "${{ inputs.summary }}" = "true" ]; then
          ARGS="$ARGS --summary"
        fi

        # Always add the path last
        ARGS="$ARGS ${{ inputs.path }}"

        # Run scanner and capture output
        set +e
        OUTPUT=$($CMD $ARGS 2>&1)
        EXIT_CODE=$?
        set -e

        echo "$OUTPUT"

        # Parse total match count from output (all modes now emit "Total matches: N")
        MATCHES=$(echo "$OUTPUT" | grep -oE 'Total matches: [0-9]+' | grep -oE '[0-9]+' || echo "0")
        if [ -z "$MATCHES" ]; then MATCHES="0"; fi
        echo "matches-found=$MATCHES" >> $GITHUB_OUTPUT

        # Parse new matches if baseline was used
        NEW_MATCHES=$(echo "$OUTPUT" | grep -oE 'New matches: [0-9]+' | grep -oE '[0-9]+' || echo "0")
        if [ -z "$NEW_MATCHES" ]; then NEW_MATCHES="0"; fi
        echo "new-matches=$NEW_MATCHES" >> $GITHUB_OUTPUT

        # Generate job summary
        {
          echo "## 🛡️ PII Scanner Results"
          echo ""
          if [ "$MATCHES" = "0" ]; then
            echo "✅ **No PII detected** — all clear."
          else
            if [ -n "${{ inputs.baseline }}" ] && [ "$NEW_MATCHES" = "0" ]; then
              echo "✅ **$MATCHES total match(es)** found, but **no new matches** since baseline."
            elif [ -n "${{ inputs.baseline }}" ] && [ "$NEW_MATCHES" != "0" ]; then
              echo "⚠️ **$NEW_MATCHES new PII match(es)** found (total: $MATCHES)."
            else
              echo "⚠️ **$MATCHES PII match(es)** found."
            fi
            echo ""
            echo "<details>"
            echo "<summary>Scanner output</summary>"
            echo ""
            echo '```'
            echo "$OUTPUT"
            echo '```'
            echo ""
            echo "</details>"
          fi
        } >> $GITHUB_STEP_SUMMARY

        # Determine whether to fail the step
        if [ "${{ inputs.fail-on-match }}" = "true" ] && [ "$EXIT_CODE" -ne 0 ]; then
          if [ -n "${{ inputs.baseline }}" ]; then
            echo "::error::New PII detected: $NEW_MATCHES new match(es) since baseline"
          else
            echo "::error::PII detected: $MATCHES match(es) found"
          fi
          exit 1
        fi

        exit 0
